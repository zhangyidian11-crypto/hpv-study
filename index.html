        function handleUserChoice(choiceId) {
            const options = document.getElementById('interactive-options');

            if (choiceId === 1) {
                appendUserMessage("什么是 HPV？男女都会感染和致病吗？");

                showTypingIndicator(() => {
                    appendAiMessage(`
                        <strong>HPV（人乳头瘤病毒）</strong>是一种极为常见的易感病毒。
                        <br><br>
                        ⚠️ <strong>关键事实：男女均会感染！</strong>
                        <br>
                        • <strong>女生感染</strong>：长期持续感染高危型 HPV 是导致宫颈癌的重要原因。
                        <br>

                            </button>

                        lucide.createIcons();
                    }, 500);
                });
            } else if (choiceId === 2) {
                appendUserMessage("听说有 2价、4价、9价，有什么区别？");
                options.innerHTML = '';
                showTypingIndicator(() => {
                    appendAiMessage(`
                        “价”代表疫苗能预防的<strong>病毒亚型数量</strong>。价数越高，预防范围越广：
                        <br><br>
                        • <strong>2价疫苗</strong>：预防 HPV 16、18型。
                        <br>
                        • <strong>4价疫苗</strong>：在2价基础上，增加了对 6、11型的预防。
                        <br>
                        • <strong>9价疫苗</strong>：预防范围最广，可预防更多亚型。
                    `);

                    setTimeout(() => {
                        if (currentGroup === 'G6') {
                            options.innerHTML = `

                        } else {

                                <button onclick="showIntervention()" class="w-full text-left text-xs bg-blue-600 hover:bg-blue-700 text-white px-3.5 py-3 rounded-xl transition shadow-md font-bold flex justify-between items-center">
                                    <span>📢 获取我的接种建议指南</span>
                                    <i data-lucide="arrow-right" class="w-4 h-4 text-white"></i>
                                </button>

                        }
                        lucide.createIcons();
                    }, 500);
                });
            }
        }

        function showIntervention() {
            const options = document.getElementById('interactive-options');
            options.innerHTML = '';
            appendUserMessage("获取我的接种建议指南");

            showTypingIndicator(() => {
                const data = frameworkTexts[currentGroup];

                    <div class="border-l-4 border-blue-500 pl-3 py-1 mb-3">

                    </div>
                    <div class="text-slate-700 leading-relaxed text-xs">

                    </div>
                `);

                options.innerHTML = `
                    <div class="text-center py-2 text-xs text-slate-400 flex items-center justify-center gap-1">
                        <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i>
                        您已完成本次 AI 健康咨询

                `;
                lucide.createIcons();
            });
        }

        function startG6Flow() {
            const options = document.getElementById('interactive-options');
            options.innerHTML = '';
            appendUserMessage("开启专属接种评估");

            showTypingIndicator(() => {
                appendAiMessage(`
                    为了给您生成<strong>量身定制</strong>的专属接种建议，我需要向您提 4 个简单问题。
                    <br><br>
                    <strong>问题 1：您目前是否已经接种过 HPV 疫苗？</strong>
                `);

                options.innerHTML = `
                    <button onclick="saveG6Answer('hasVaccinated', 'yes')" class="w-full text-left text-xs bg-white hover:bg-emerald-50 text-slate-700 hover:text-emerald-600 border border-slate-200 hover:border-emerald-300 px-3.5 py-2.5 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                        <span>已接种（哪怕只打过 1 针）</span>
                        <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">已接种</span>
                    </button>
                    <button onclick="saveG6Answer('hasVaccinated', 'no')" class="w-full text-left text-xs bg-white hover:bg-blue-50 text-slate-700 hover:text-blue-600 border border-slate-200 hover:border-blue-300 px-3.5 py-2.5 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                        <span>从未接种过</span>
                        <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">核心目标</span>
                    </button>
                `;
                lucide.createIcons();

        }

        function saveG6Answer(key, value) {
            g6State[key] = value;
            const options = document.getElementById('interactive-options');
            options.innerHTML = '';

            if (key === 'hasVaccinated' && value === 'yes') {
                appendUserMessage("我之前已经接种过 HPV 疫苗。");
                showTypingIndicator(() => {
                    appendAiMessage(`
                        <div class="p-3 bg-emerald-50 border border-emerald-200 rounded-xl mb-3">
                            <span class="text-xs font-bold text-emerald-800 flex items-center gap-1">
                                <i data-lucide="check-circle-2" class="w-4 h-4"></i> 状态：已接种
                            </span>
                            <p class="text-[11px] text-emerald-700 mt-1">
                                提示：您可以返回问卷继续填写。
                            </p>
                        </div>
                        <strong>🎉 太棒了！您已经迈出了保护健康的关键一步！</strong>
                        <br><br>
                        <strong>💡 AI 专属建议：</strong>
                        <br>
                        1. 如果只接种了部分针剂，请按程序完成后续针剂。
                        <br>
                        2. 已完成全程接种者，可按医生建议继续随访。
                    `);

                    options.innerHTML = `
                        <div class="text-center py-2 text-xs text-slate-400 flex items-center justify-center gap-1">
                            <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i>
                            评估完成（已接种群体）
                        </div>
                    `;
                    lucide.createIcons();
                });
                return;
            }

            if (key === 'hasVaccinated' && value === 'no') {
                appendUserMessage("我从未接种过 HPV 疫苗。");
                showTypingIndicator(() => {
                    appendAiMessage(`
                        <div class="p-2.5 bg-amber-50 border border-amber-200 rounded-xl mb-3 text-[11px] text-amber-800">
                            🎯 您属于<strong>【未接种群体】</strong>。
                        </div>
                        <strong>问题 2：您的生理性别是？</strong>
                    `);
                    options.innerHTML = `
                        <button onclick="saveG6Answer('gender', 'M')" class="w-full text-left text-xs bg-white hover:bg-blue-50 text-slate-700 hover:text-blue-600 border border-slate-200 hover:border-blue-300 px-3.5 py-2 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                            <span>男生 (Male)</span>
                            <i data-lucide="mars" class="w-4 h-4 text-blue-500"></i>
                        </button>
                        <button onclick="saveG6Answer('gender', 'F')" class="w-full text-left text-xs bg-white hover:bg-pink-50 text-slate-700 hover:text-pink-600 border border-slate-200 hover:border-pink-300 px-3.5 py-2 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                            <span>女生 (Female)</span>
                            <i data-lucide="venus" class="w-4 h-4 text-pink-500"></i>
                        </button>
                    `;
                    lucide.createIcons();
                });
            } else if (key === 'gender') {
                const genderText = value === 'M' ? "男生" : "女生";
                appendUserMessage(`我是${genderText}。`);
                showTypingIndicator(() => {
                    appendAiMessage(`
                        收到。
                        <br><br>
                        <strong>问题 3：在选择疫苗时，您的预算/经济承受力如何？</strong>
                    `);
                    options.innerHTML = `
                        <button onclick="saveG6Answer('budget', 'high')" class="w-full text-left text-xs bg-white hover:bg-blue-50 text-slate-700 hover:text-blue-600 border border-slate-200 hover:border-blue-300 px-3.5 py-2.5 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                            <span>自费九价无压力</span>
                            <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">追求全面保护</span>
                        </button>
                        <button onclick="saveG6Answer('budget', 'low')" class="w-full text-left text-xs bg-white hover:bg-blue-50 text-slate-700 hover:text-blue-600 border border-slate-200 hover:border-blue-300 px-3.5 py-2.5 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                            <span>预算有限，追求高性价比</span>
                            <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">追求经济划算</span>

                            <span>预约太难，抢不到针，流程繁琐</span>
                            <i data-lucide="calendar-x" class="w-4 h-4 text-red-500"></i>
                        </button>
                        <button onclick="saveG6Answer('concern', 'no-sex')" class="w-full text-left text-xs bg-white hover:bg-blue-50 text-slate-700 hover:text-blue-600 border border-slate-200 hover:border-blue-300 px-3.5 py-2.5 rounded-xl transition shadow-sm font-medium flex justify-between items-center">
                            <span>目前没有性生活，觉得没必要打</span>
                            <i data-lucide="help-circle" class="w-4 h-4 text-slate-400"></i>
                        </button>
                    `;
                    lucide.createIcons();
                });
            } else if (key === 'concern') {
                let concernText = "";
                if (value === 'side-effect') concernText = "担心疫苗副作用";
                if (value === 'hard-to-get') concernText = "抢不到针/流程繁琐";
                if (value === 'no-sex') concernText = "无性生活觉得没必要";

                appendUserMessage(`我的核心顾虑是：${concernText}。`);

        function generateG6TailoredAdvice() {
            const { gender, budget, concern } = g6State;
            const options = document.getElementById('interactive-options');
            const genderLabel = gender === 'M' ? "男生" : "女生";
            const budgetLabel = budget === 'high' ? "预算充足" : "精打细算";

            let adviceHtml = `
                <div class="p-3 bg-gradient-to-r from-amber-500/10 to-orange-500/10 border border-amber-200 rounded-xl mb-4">
                    <span class="text-xs font-bold text-amber-800 flex items-center gap-1">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> 您的专属画像：未接种 · ${genderLabel} · ${budgetLabel}
                    </span>
                </div>
                <strong>💡 针对您个人情况的深度接种建议：</strong>
                <br><br>
            `;

            if (gender === 'M') {
                adviceHtml += `• <strong>疫苗选择</strong>：`;
                if (budget === 'high') {
                    adviceHtml += `强烈推荐您选择 <strong>9价 HPV 疫苗</strong>。`;
                } else {
                    adviceHtml += `建议您选择 <strong>4价 HPV 疫苗</strong>。`;
                }

                adviceHtml += `<br><br>• <strong>消除您的顾虑（针对您的痛点）</strong>：<br>`;
                if (concern === 'side-effect') {
                    adviceHtml += `针对您担心的【安全性】：常见不良反应多为局部疼痛、红肿或轻微发热。`;
                } else if (concern === 'hard-to-get') {
                    adviceHtml += `针对您担心的【抢不到针】：可优先关注社区医院或疾控预约渠道。`;
                } else if (concern === 'no-sex') {
                    adviceHtml += `针对您认为的【无性生活不需要】：越早接种越有利于获得保护。`;
                }

                adviceHtml += `<br><br>• <strong>男生接种的额外社会价值</strong>：接种不仅保护自己，也有助于减少传播风险。`;

            } else {
                adviceHtml += `• <strong>疫苗选择</strong>：`;
                if (budget === 'high') {
                    adviceHtml += `强烈推荐您选择 <strong>9价 HPV 疫苗</strong>。`;
                } else {
                    adviceHtml += `强烈建议您优先考虑 <strong>2价 HPV 疫苗</strong>。`;
                }

                adviceHtml += `<br><br>• <strong>消除您的顾虑（针对您的痛点）</strong>：<br>`;
                if (concern === 'side-effect') {
                    adviceHtml += `针对您担心的【安全性】：HPV 疫苗不含活病毒。`;
                } else if (concern === 'hard-to-get') {
                    adviceHtml += `针对您担心的【抢不到针】：如果高价数难约，可先接种可及疫苗。`;
                } else if (concern === 'no-sex') {
                    adviceHtml += `针对您认为的【无性生活不需要】：无性生活阶段往往更适合尽早预防。`;
                }
            }

            appendAiMessage(adviceHtml);

            options.innerHTML = `
                <div class="text-center py-2 text-xs text-slate-400 flex flex-col items-center justify-center gap-1">
                    <span class="flex items-center gap-1 text-emerald-600 font-medium">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                        已为您生成专属接种决策方案
                    </span>
                    <button onclick="resetChat()" class="mt-2 text-[10px] text-blue-600 hover:underline">重新评估</button>
                </div>
            `;
            lucide.createIcons();
        }
    </script>
